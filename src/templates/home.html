<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Exam Performance Indicator</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 600px; margin: 40px auto; padding: 30px; border-radius: 12px; }
        h1 { font-size: 1.5rem; }
        .result-box { background: #e9f7ef; border-radius: 8px; padding: 16px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow">
        <h1 class="text-center mb-4">Student Exam Performance Prediction</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <!-- Gender -->
            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender" required>
                    <option selected disabled value="">Select your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <!-- Race / Ethnicity -->
            <div class="mb-3">
                <label class="form-label">Race or Ethnicity</label>
                <select class="form-select" name="ethnicity" required>
                    <option selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <!-- Parental Education -->
            <div class="mb-3">
                <label class="form-label">Parental Level of Education</label>
                <select class="form-select" name="parental_level_of_education" required>
                    <option selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">associate's degree</option>
                    <option value="bachelor's degree">bachelor's degree</option>
                    <option value="high school">high school</option>
                    <option value="master's degree">master's degree</option>
                    <option value="some college">some college</option>
                    <option value="some high school">some high school</option>
                </select>
            </div>

            <!-- Lunch -->
            <div class="mb-3">
                <label class="form-label">Lunch Type</label>
                <select class="form-select" name="lunch" required>
                    <option selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">free/reduced</option>
                    <option value="standard">standard</option>
                </select>
            </div>

            <!-- Test Preparation Course -->
            <div class="mb-3">
                <label class="form-label">Test Preparation Course</label>
                <select class="form-select" name="test_preparation_course" required>
                    <option selected disabled value="">Select Course Status</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <!-- Reading Score -->
            <div class="mb-3">
                <label class="form-label">Reading Score (out of 100)</label>
                <input
                    class="form-control"
                    type="number"
                    name="reading_score"
                    placeholder="Enter your Reading Score"
                    min="0" max="100" required
                />
            </div>

            <!-- Writing Score -->
            <div class="mb-3">
                <label class="form-label">Writing Score (out of 100)</label>
                <input
                    class="form-control"
                    type="number"
                    name="writing_score"
                    placeholder="Enter your Writing Score"
                    min="0" max="100" required
                />
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Predict Maths Score</button>
            </div>
        </form>

        {% if results is defined and results is not none %}
        <div class="result-box text-center">
            <h4>Predicted Maths Score: <strong>{{ "%.2f" | format(results) }}</strong></h4>
        </div>
        {% endif %}

    </div>
</div>
</body>
</html>
